name: Intraday Entry Scan

on:
  workflow_dispatch:
    inputs:
      broker:
        description: 'Broker'
        required: false
        default: 'alpaca'
        type: choice
        options: [alpaca, simulation]

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run entry scan
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
          ALPACA_API_KEY:     ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:  ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          for attempt in 1 2 3; do
            echo "▶ Attempt $attempt of 3"
            python orchestrator.py --mode entry_scan --broker ${{ github.event.inputs.broker || 'alpaca' }} && break
            if [ $attempt -lt 3 ]; then
              echo "  ⚠️ Attempt $attempt failed — retrying in 60s..."
              sleep 60
            else
              echo "  ❌ All 3 attempts failed"
              exit 1
            fi
          done

      - name: Notify on failure
        if: failure()
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL:        amit.thirdeyetrading@gmail.com
        run: |
          python - <<'PY'
          import os, smtplib
          from email.mime.text import MIMEText
          repo = "${{ github.repository }}"
          run  = "${{ github.run_id }}"
          url  = f"https://github.com/{repo}/actions/runs/{run}"
          msg  = MIMEText(f"Strategy B entry_scan FAILED.\n\nLogs: {url}")
          msg["Subject"] = "[Strategy B] entry_scan FAILED"
          msg["From"]    = os.environ["GMAIL_USER"]
          msg["To"]      = os.environ["ALERT_EMAIL"]
          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
              s.login(os.environ["GMAIL_USER"], os.environ["GMAIL_APP_PASSWORD"])
              s.send_message(msg)
          PY
