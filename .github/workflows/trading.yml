name: Trading Agent B

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'premarket'
        type: choice
        options: [premarket, intraday, eod]
      broker:
        description: 'Broker'
        required: false
        default: 'alpaca'
        type: choice
        options: [alpaca, simulation]

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Determine mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ github.event.inputs.mode }}" >> $GITHUB_OUTPUT
            echo "broker=${{ github.event.inputs.broker || 'alpaca' }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            MIN=$(date -u +%M)
            TIME=$((10#$HOUR * 60 + 10#$MIN))
            if [ $TIME -ge 840 ] && [ $TIME -lt 870 ]; then
              echo "mode=premarket" >> $GITHUB_OUTPUT
            elif [ $TIME -ge 1195 ]; then
              echo "mode=eod" >> $GITHUB_OUTPUT
            else
              echo "mode=intraday" >> $GITHUB_OUTPUT
            fi
            echo "broker=alpaca" >> $GITHUB_OUTPUT
          fi

      - name: Run Strategy B
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
          ALPACA_API_KEY:     ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY:  ${{ secrets.ALPACA_SECRET_KEY }}
        run: |
          for attempt in 1 2 3; do
            echo "▶ Attempt $attempt of 3"
            python orchestrator.py --mode ${{ steps.mode.outputs.mode }} --broker ${{ steps.mode.outputs.broker }} && break
            if [ $attempt -lt 3 ]; then
              echo "  ⚠️ Attempt $attempt failed — retrying in 60s..."
              sleep 60
            else
              echo "  ❌ All 3 attempts failed"
              exit 1
            fi
          done

      - name: Verify premarket wrote DB record
        if: steps.mode.outputs.mode == 'premarket'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python - <<'PY'
          import os, sys
          from datetime import date
          from supabase import create_client
          sb = create_client(os.environ["SUPABASE_URL"], os.environ["SUPABASE_KEY"])
          today = date.today().isoformat()
          rows = sb.table("b_scan_results").select("id").eq("date", today).eq("scan_type", "premarket").execute().data
          if not rows:
              print(f"ASSERTION FAILED: no premarket record in b_scan_results for {today}")
              sys.exit(1)
          print(f"Assertion passed: premarket record found for {today}")
          PY

      - name: Notify on failure
        if: failure()
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL:        amit.thirdeyetrading@gmail.com
        run: |
          python - <<'PY'
          import os, smtplib
          from email.mime.text import MIMEText
          mode = "${{ steps.mode.outputs.mode }}"
          repo = "${{ github.repository }}"
          run  = "${{ github.run_id }}"
          url  = f"https://github.com/{repo}/actions/runs/{run}"
          msg  = MIMEText(f"Strategy B {mode} workflow FAILED.\n\nLogs: {url}")
          msg["Subject"] = f"[Strategy B] {mode} FAILED"
          msg["From"]    = os.environ["GMAIL_USER"]
          msg["To"]      = os.environ["ALERT_EMAIL"]
          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
              s.login(os.environ["GMAIL_USER"], os.environ["GMAIL_APP_PASSWORD"])
              s.send_message(msg)
          print("Failure alert sent.")
          PY
