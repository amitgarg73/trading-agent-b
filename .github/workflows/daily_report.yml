name: Daily Morning Report

on:
  schedule:
    - cron: '30 14 * * 1-5'   # 10:30 AM ET (14:30 UTC) — after all premarket sessions complete
  workflow_dispatch:           # manual trigger any time

jobs:
  report:
    name: Send daily report
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send daily report
        env:
          # Strategy B (same project as this repo)
          SUPABASE_URL:       ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:       ${{ secrets.SUPABASE_KEY }}
          # Strategy A (add SUPABASE_URL_A / SUPABASE_KEY_A secrets if separate project;
          # falls back to B creds if A and B share a Supabase project)
          SUPABASE_URL_A:     ${{ secrets.SUPABASE_URL_A }}
          SUPABASE_KEY_A:     ${{ secrets.SUPABASE_KEY_A }}
          # Strategy C
          SUPABASE_URL_C:     ${{ secrets.SUPABASE_URL_C }}
          SUPABASE_KEY_C:     ${{ secrets.SUPABASE_KEY_C }}
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python daily_report.py

      - name: Notify on failure
        if: failure()
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL:        amit.thirdeyetrading@gmail.com
        run: |
          python - <<'PY'
          import os, smtplib
          from email.mime.text import MIMEText
          repo = "${{ github.repository }}"
          run  = "${{ github.run_id }}"
          url  = f"https://github.com/{repo}/actions/runs/{run}"
          msg  = MIMEText(f"Daily report script FAILED.\n\nLogs: {url}")
          msg["Subject"] = "[Trading] Daily report FAILED"
          msg["From"]    = os.environ["GMAIL_USER"]
          msg["To"]      = os.environ["ALERT_EMAIL"]
          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as s:
              s.login(os.environ["GMAIL_USER"], os.environ["GMAIL_APP_PASSWORD"])
              s.send_message(msg)
          PY
